<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>小包包的愿望清单</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:linear-gradient(135deg,#F9F0FF 0%,#FFF5F0 30%,#F0FBF7 60%,#FFF8E8 100%);
  background-attachment:fixed;
  font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;
  min-height:100vh;
  padding-bottom:80px;
}

/* Header */
.header{text-align:center;padding:clamp(22px,5vw,38px) 16px 6px;position:relative;}
.header::before{content:'✦';position:absolute;top:20px;left:10%;font-size:18px;color:#E8D8F8;animation:float 3s ease-in-out infinite;}
.header::after{content:'✧';position:absolute;top:32px;right:9%;font-size:13px;color:#C8EEDC;animation:float 3s ease-in-out infinite 1.5s;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.subtitle{font-size:10px;color:#C8B8DC;letter-spacing:5px;margin-bottom:8px;font-weight:500;}
.title{font-family:'Nunito',sans-serif;font-size:clamp(22px,6vw,44px);color:#6B3FA0;font-weight:900;line-height:1.2;margin-bottom:6px;letter-spacing:-0.5px;}
.progress{font-size:12px;color:#B8A8CC;}

/* Filter tabs */
.filters{display:flex;gap:6px;justify-content:center;padding:14px 10px 18px;flex-wrap:wrap;}
.filter-btn{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;border:1.5px solid #E8E0F0;background:white;color:#9080A8;font-weight:400;transition:all 0.15s;white-space:nowrap;}
.filter-btn.active{border-color:#C4B5FD;background:#EDE9FE;color:#5B21B6;font-weight:700;}
.filter-btn:hover:not(.active){background:#F8F4FF;}

/* Grid */
.grid{display:grid;gap:9px;padding:0 10px;max-width:920px;margin:0 auto;width:100%;}
@media(max-width:759px){.grid{grid-template-columns:repeat(2,1fr);gap:8px;padding:0 8px;}}
@media(min-width:760px){.grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:0 12px;}}

/* Compact card on mobile */
@media(max-width:759px){
  .card{padding:11px 11px;}
  .card-emoji{font-size:18px;}
  .card-title{font-size:13px;}
  .card-desc{font-size:11px;}
  .badge{font-size:9px;padding:2px 7px;}
  .card-date{font-size:9px;}
  .action-btn{padding:3px 7px;font-size:11px;}
  .mark-btn{padding:3px 6px;font-size:10px;}
  .del-btn{padding:3px 7px;font-size:11px;}
}

/* Card */
.card{
  border-radius:20px;padding:15px 16px;
  transition:transform 0.2s,box-shadow 0.2s;
  animation:fadeIn 0.3s ease both;
  backdrop-filter:blur(18px) saturate(170%);
  -webkit-backdrop-filter:blur(18px) saturate(170%);
  box-shadow:0 6px 22px rgba(120,80,200,0.07),0 1.5px 0 rgba(255,255,255,0.88) inset;
  overflow:hidden;min-width:0;
  display:flex;flex-direction:column;
  cursor:pointer;
}
.card:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(120,80,200,0.12),0 1.5px 0 rgba(255,255,255,0.95) inset;}
.card.done{opacity:0.6;}
.card-content{flex:1;}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}

/* Card top: badge left, date right */
.card-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;background:rgba(255,255,255,0.68);}
.card-date{font-size:10px;font-weight:500;white-space:nowrap;flex-shrink:0;opacity:0.7;}

/* Card body */
.card-body{display:flex;gap:9px;align-items:flex-start;margin-bottom:7px;}
.card-emoji{font-size:22px;line-height:1.35;flex-shrink:0;}
.card-title{font-weight:700;font-size:15px;color:#3D2A5A;line-height:1.45;word-break:break-all;}
.card-title.done-text{text-decoration:line-through;text-decoration-color:#C0C0C0;}
.card-desc{font-size:12px;color:#7A6A8A;line-height:1.65;margin-bottom:10px;word-break:break-all;}

/* Actions */
.actions{display:flex;gap:5px;align-items:center;}
.action-btn{display:flex;align-items:center;gap:3px;padding:4px 10px;border-radius:14px;font-size:12px;cursor:pointer;font-family:inherit;transition:background 0.1s;background:rgba(255,255,255,0.55);white-space:nowrap;}
.mark-btn{margin-left:auto;padding:4px 9px;border-radius:14px;font-size:11px;cursor:pointer;font-family:inherit;background:rgba(255,255,255,0.55);white-space:nowrap;}
.mark-btn.done-btn{background:rgba(209,250,229,0.7) !important;color:#059669 !important;border-color:#6EE7B7 !important;}
.del-btn{padding:4px 9px;border-radius:14px;font-size:12px;cursor:pointer;font-family:inherit;background:rgba(255,255,255,0.55);border:1px solid rgba(252,165,165,0.7);color:#EF4444;white-space:nowrap;transition:background 0.1s;}
.del-btn:hover{background:rgba(254,226,226,0.8);}

/* Comments */
.comments-panel{margin-top:11px;border-top-style:dashed;border-top-width:1px;padding-top:10px;}
.comment-empty{font-size:11px;color:#C0B0D0;text-align:center;margin-bottom:8px;}
.comment-item{background:rgba(255,255,255,0.72);border-radius:9px;padding:6px 10px;margin-bottom:5px;font-size:12px;color:#5A4A6A;line-height:1.5;word-break:break-all;}
.comment-time{font-size:10px;color:#C0B0D0;margin-left:6px;}
.comment-input-row{display:flex;gap:6px;margin-top:7px;}
.comment-input{flex:1;min-width:0;border-radius:9px;padding:7px 10px;font-size:12px;outline:none;font-family:inherit;background:rgba(255,255,255,0.85);}
.comment-send{border:none;border-radius:9px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap;}

/* Empty */
.empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:#C0B0D0;}
.empty-icon{font-size:36px;margin-bottom:10px;}

/* Add button */
.add-wrap{display:flex;justify-content:center;padding:22px 0 0;}
.add-btn{display:flex;align-items:center;gap:8px;padding:12px 28px;border-radius:28px;background:#EDE9FE;border:1.5px solid #C4B5FD;color:#5B21B6;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.add-btn:hover{background:#DDD5FF;transform:scale(1.02);}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(70,40,110,0.26);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.sheet{background:white;border-radius:20px 20px 0 0;padding:18px 16px 44px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;animation:slideUp 0.25s ease;-webkit-overflow-scrolling:touch;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:32px;height:4px;border-radius:2px;background:#E0D0F0;margin:0 auto 14px;}
.sheet-title{text-align:center;font-size:15px;font-weight:700;color:#5B3F7A;margin-bottom:16px;}
.field{margin-bottom:12px;}
.field-label{font-size:11px;color:#9080A8;margin-bottom:6px;font-weight:500;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:5px;}
.emoji-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid #EDE9FE;background:white;font-size:18px;cursor:pointer;transition:all 0.1s;display:flex;align-items:center;justify-content:center;}
.emoji-btn.sel{border-color:#C4B5FD;background:#EDE9FE;}
.text-input{width:100%;border:1.5px solid #E8E0F0;border-radius:10px;padding:9px 12px;font-size:14px;outline:none;font-family:inherit;}
.text-input:focus{border-color:#C4B5FD;}
.textarea{resize:none;height:64px;}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.type-btn{padding:10px 4px;border-radius:10px;border:1.5px solid #E8E0F0;background:white;color:#9080A8;font-size:12px;cursor:pointer;font-family:inherit;font-weight:400;transition:all 0.15s;text-align:center;line-height:1.45;}
.type-btn.sel{border-color:#F9A8D4;background:#FDF2F8;color:#9D174D;font-weight:700;}
.type-hint{font-size:10px;color:#C8B8DC;margin-top:6px;min-height:14px;}
.submit-btn{width:100%;padding:13px;border-radius:12px;border:none;background:#C4B5FD;color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;margin-top:10px;}
.submit-btn:disabled{background:#F0E8FF;color:#D0C0E8;cursor:default;}
.submit-btn:not(:disabled):hover{background:#A78BFA;}

/* Detail / Edit modal */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(70,40,110,0.3);z-index:300;align-items:flex-end;justify-content:center;}
.detail-overlay.show{display:flex;}
.detail-sheet{background:white;border-radius:20px 20px 0 0;padding:18px 16px 48px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;animation:slideUp 0.25s ease;-webkit-overflow-scrolling:touch;}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.detail-title-bar{font-size:15px;font-weight:700;color:#5B3F7A;}
.detail-close{background:none;border:none;font-size:20px;cursor:pointer;color:#C0B0D0;padding:0 4px;line-height:1;}
.detail-save{padding:8px 18px;border-radius:20px;border:none;background:#C4B5FD;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.detail-save:hover{background:#A78BFA;}
</style>
</head>
<body>

<div class="header">
  <div class="subtitle">✦ WISH LIST ✦</div>
  <div class="title">小包包的愿望清单</div>
  <div class="progress" id="progress"></div>
</div>

<div class="filters">
  <button class="filter-btn active" data-f="all">全部 ✦</button>
  <button class="filter-btn" data-f="place">想去的地方</button>
  <button class="filter-btn" data-f="exp">想做的事</button>
  <button class="filter-btn" data-f="food">想吃的美食</button>
  <button class="filter-btn" data-f="mix">胖胖愿望 🌈</button>
  <button class="filter-btn" data-f="done">已实现 ✓</button>
</div>

<div class="grid" id="grid"></div>

<div class="add-wrap">
  <button class="add-btn" onclick="openModal()">✦ 许一个新愿望</button>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title">许一个新愿望 ✨</div>
    <div class="field">
      <div class="field-label">选个表情</div>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
    <div class="field">
      <div class="field-label">愿望是？</div>
      <input class="text-input" id="inp-title" placeholder="写下你的愿望…" oninput="checkSubmit()">
    </div>
    <div class="field">
      <div class="field-label">描述一下（可选）</div>
      <textarea class="text-input textarea" id="inp-desc" placeholder="更多细节…"></textarea>
    </div>
    <div class="field">
      <div class="field-label">类型（可以多选哦）</div>
      <div class="type-grid">
        <button class="type-btn" data-t="exp"   onclick="toggleType(this)">✨<br>想做的事</button>
        <button class="type-btn" data-t="place" onclick="toggleType(this)">🗺<br>想去的地方</button>
        <button class="type-btn" data-t="food"  onclick="toggleType(this)">🍜<br>想吃的美食</button>
      </div>
      <div class="type-hint" id="type-hint">请至少选择一项</div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="addWish()" disabled>许愿 🌟</button>
  </div>
</div>

<!-- Detail / Edit modal -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="detail-header">
      <div class="detail-title-bar">编辑愿望</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="detail-save" onclick="saveDetail()">保存</button>
        <button class="detail-close" onclick="document.getElementById('detail-overlay').classList.remove('show')">✕</button>
      </div>
    </div>
    <div class="field">
      <div class="field-label">表情</div>
      <div class="emoji-grid" id="detail-emoji-grid"></div>
    </div>
    <div class="field">
      <div class="field-label">愿望标题</div>
      <input class="text-input" id="detail-title" placeholder="愿望是…">
    </div>
    <div class="field">
      <div class="field-label">描述（可选）</div>
      <textarea class="text-input textarea" id="detail-desc" placeholder="更多细节…" style="height:80px"></textarea>
    </div>
    <div class="field">
      <div class="field-label">类型（可多选）</div>
      <div class="type-grid" id="detail-type-grid">
        <button class="type-btn" data-t="exp"   onclick="toggleDetailType(this)">✨<br>想做的事</button>
        <button class="type-btn" data-t="place" onclick="toggleDetailType(this)">🗺<br>想去的地方</button>
        <button class="type-btn" data-t="food"  onclick="toggleDetailType(this)">🍜<br>想吃的美食</button>
      </div>
    </div>
  </div>
</div>

<script>
const CAT_PALETTE={
  place:{bg:'rgba(219,234,254,0.72)',bd:'rgba(147,197,253,0.88)',tx:'#1E40AF',label:'🗺 地方'},
  exp:  {bg:'rgba(237,233,254,0.72)',bd:'rgba(196,181,253,0.88)',tx:'#5B21B6',label:'✨ 体验'},
  food: {bg:'rgba(254,249,195,0.72)',bd:'rgba(250,220,60,0.88)', tx:'#854D0E',label:'🍜 美食'},
  mix:  {bg:'rgba(253,230,238,0.72)',bd:'rgba(249,168,212,0.88)',tx:'#9D174D',label:'🌈 胖胖'},
  done: {bg:'rgba(243,244,246,0.65)',bd:'rgba(209,213,219,0.82)',tx:'#6B7280',label:''},
};
const EMOJIS=['✨','🌸','🍁','🌊','🍵','🌠','🎪','🏔️','🌺','🍜','🌙','🎨','🦋','🍓','⛵','🌴','🎡','🧁','🗻','🏖️'];

function getCatKey(cats){
  if(!cats||cats.length===0)return'exp';
  if(cats.length===1)return cats[0];
  return'mix';
}
function getPalette(w){
  if(w.done)return CAT_PALETTE.done;
  return CAT_PALETTE[getCatKey(w.cats||[w.cat||'exp'])]||CAT_PALETTE.exp;
}
function fmtDate(ts){
  if(!ts)return'';
  const d=new Date(ts);
  return(d.getMonth()+1)+'月'+d.getDate()+'日';
}

function defWishes(){return[
  {id:1,title:'去京都看枫叶',desc:'秋天的岚山，红叶满地，和喜欢的人一起',cats:['place'],emoji:'🍁',likes:3,comments:[{t:'一定好美！我也想去 🥺',at:'2天前'}],done:false,createdAt:new Date('2025-11-03').getTime()},
  {id:2,title:'学会做抹茶蛋糕',desc:'要那种很嫩很好吃的，自己做给朋友吃',cats:['exp'],emoji:'🍵',likes:5,comments:[],done:false,createdAt:new Date('2025-12-15').getTime()},
  {id:3,title:'在野外看一次流星雨',desc:'躺在草地上，数着流星许愿',cats:['exp'],emoji:'🌠',likes:7,comments:[{t:'英仙座每年八月，记一下！',at:'昨天'}],done:true,createdAt:new Date('2025-08-10').getTime()},
  {id:4,title:'去看海边日出',desc:'从天还黑等到天亮那种',cats:['place'],emoji:'🌊',likes:2,comments:[],done:false,createdAt:new Date('2026-01-20').getTime()},
  {id:5,title:'吃一次正宗博多豚骨拉面',desc:'在福冈的小巷子里，深夜的那种',cats:['food'],emoji:'🍜',likes:4,comments:[],done:false,createdAt:new Date('2026-02-08').getTime()},
  {id:6,title:'京都吃怀石料理',desc:'边赏枫叶边吃，一举两得',cats:['place','food'],emoji:'🍱',likes:6,comments:[],done:false,createdAt:new Date('2026-03-01').getTime()},
];}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const JSONBIN_KEY = '$2a$10$2St/FcYAAz78Dx5KEaYV8OFiNRNOa6yBrrKJd3E6K.91rqzKPUC6m';
const JSONBIN_BIN_ID = '69b6a047aa77b81da9e7d4ce';  
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let wishes=[],filter='all',openComment=null,selEmoji='✨',selCats=[];
let editingId=null,detailEmoji='✨',detailCats=[];
let saving=false,saveQueued=false;

// 实际使用的 binId：优先用硬编码的，否则用 localStorage 里的
let binId=JSONBIN_BIN_ID||localStorage.getItem('xbb-bin-id')||'';

function showStatus(msg,ok=true){
  let el=document.getElementById('sync-status');
  if(!el){el=document.createElement('div');el.id='sync-status';el.style.cssText='position:fixed;bottom:14px;left:50%;transform:translateX(-50%);padding:6px 16px;border-radius:20px;font-size:12px;font-family:inherit;z-index:999;transition:opacity 0.4s;pointer-events:none;';document.body.appendChild(el);}
  el.textContent=msg;
  el.style.background=ok?'rgba(209,250,229,0.95)':'rgba(254,226,226,0.95)';
  el.style.color=ok?'#065f46':'#991b1b';
  el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.opacity='0',2500);
}

async function load(){
  document.getElementById('grid').innerHTML='<div class="empty"><div style="font-size:28px;margin-bottom:8px">☁️</div><div>加载中…</div></div>';
  try{
    if(!binId){
      // 第一次：创建新 bin
      const res=await fetch('https://api.jsonbin.io/v3/b',{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Name':'xbb-wishlist','X-Bin-Private':'false'},
        body:JSON.stringify({wishes:defWishes()})
      });
      const data=await res.json();
      binId=data.metadata.id;
      localStorage.setItem('xbb-bin-id',binId);
      wishes=defWishes();
      // 提示用户把 binId 填进代码
      showStatus('首次同步成功！请看控制台获取 Bin ID',true);
      console.log('%c📌 请把这个 Bin ID 填入代码的 JSONBIN_BIN_ID：\n'+binId,'color:#5B21B6;font-size:14px;font-weight:bold;');
    } else {
      const res=await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`,{
        headers:{'X-Master-Key':JSONBIN_KEY}
      });
      if(!res.ok)throw new Error('fetch failed');
      const data=await res.json();
      wishes=(data.record.wishes||defWishes()).map(migrate);
      showStatus('已加载 ✓');
    }
  }catch(e){
    showStatus('加载失败，使用本地数据',false);
    try{const raw=JSON.parse(localStorage.getItem('xbb-wishes-v3')||'null');wishes=(raw||defWishes()).map(migrate);}
    catch{wishes=defWishes();}
  }
  render();
}

function migrate(w){return{...w,cats:w.cats||(w.cat?[w.cat]:['exp'])};}

async function save(){
  // 同时写一份到 localStorage 作为备份
  try{localStorage.setItem('xbb-wishes-v3',JSON.stringify(wishes));}catch{}
  if(JSONBIN_KEY===''||!binId)return;
  if(saving){saveQueued=true;return;}
  saving=true;
  try{
    await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
      body:JSON.stringify({wishes})
    });
    showStatus('已同步 ✓');
  }catch{
    showStatus('同步失败，数据已存本地',false);
  }
  saving=false;
  if(saveQueued){saveQueued=false;save();}
}

function render(){
  let vis;
  if(filter==='done')     vis=wishes.filter(w=>w.done);
  else if(filter==='all') vis=wishes.filter(w=>!w.done);
  else if(filter==='mix') vis=wishes.filter(w=>!w.done&&getCatKey(w.cats)==='mix');
  else                    vis=wishes.filter(w=>!w.done&&(w.cats||[]).includes(filter));

  const done=wishes.filter(w=>w.done).length;
  document.getElementById('progress').textContent=done+' / '+wishes.length+' 个愿望已实现 🌟';
  const g=document.getElementById('grid');
  if(!vis.length){g.innerHTML='<div class="empty"><div class="empty-icon">🌱</div><div>这里还没有愿望，快来添加吧～</div></div>';return;}
  g.innerHTML=vis.map(cardHTML).join('');
}

function cardHTML(w){
  const p=getPalette(w);
  const open=openComment===w.id;
  const dateStr=fmtDate(w.createdAt);
  const label=w.done?'已实现 ✓':p.label;
  return`<div class="card${w.done?' done':''}" style="background:${p.bg};border:1px solid ${p.bd}" onclick="openDetail(${w.id},event)">
<div class="card-content">
  <div class="card-top">
    <span class="badge" style="color:${p.tx};border:1px solid ${p.bd}">${label}</span>
    <span class="card-date" style="color:${p.tx}">${dateStr}</span>
  </div>
  <div class="card-body">
    <span class="card-emoji">${w.emoji}</span>
    <div class="card-title${w.done?' done-text':''}">${esc(w.title)}</div>
  </div>
  ${w.desc?`<div class="card-desc">${esc(w.desc)}</div>`:''}
</div>
<div class="actions" onclick="event.stopPropagation()">
  <button class="action-btn" style="border:1px solid ${p.bd};color:#8070A8;${open?'background:rgba(255,255,255,0.82)':''}" onclick="toggleComment(${w.id})">💬 ${w.comments.length}</button>
  <button class="del-btn" onclick="doDelete(${w.id})">🗑</button>
  <button class="mark-btn${w.done?' done-btn':''}" style="border:1px solid ${w.done?'#6EE7B7':p.bd};color:${w.done?'#059669':'#A090B8'}" onclick="doToggle(${w.id})">${w.done?'撤销':'标记实现'}</button>
</div>
${open?`<div class="comments-panel" style="border-top-color:${p.bd}" onclick="event.stopPropagation()">
  ${!w.comments.length?'<div class="comment-empty">还没有留言，来许个愿吧～</div>':''}
  ${w.comments.map(c=>`<div class="comment-item" style="border:1px solid ${p.bd}">${esc(c.t)}<span class="comment-time">${c.at}</span></div>`).join('')}
  <div class="comment-input-row">
    <input class="comment-input" id="ci-${w.id}" style="border:1.5px solid ${p.bd}" placeholder="留言或许愿…" onkeydown="if(event.key==='Enter')sendComment(${w.id})">
    <button class="comment-send" style="background:${p.bd};color:${p.tx}" onclick="sendComment(${w.id})">发送</button>
  </div>
</div>`:''}
</div>`;
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function doDelete(id){
  if(!confirm('确定删除这个愿望吗？'))return;
  wishes=wishes.filter(w=>w.id!==id);
  if(openComment===id)openComment=null;
  save();render();
}
function doToggle(id){wishes=wishes.map(w=>w.id===id?{...w,done:!w.done}:w);save();render();}
function toggleComment(id){
  openComment=openComment===id?null:id;render();
  if(openComment)setTimeout(()=>{const el=document.getElementById('ci-'+id);if(el)el.focus();},50);
}
function sendComment(id){
  const el=document.getElementById('ci-'+id);
  const t=(el?.value||'').trim();if(!t)return;
  wishes=wishes.map(w=>w.id===id?{...w,comments:[...w.comments,{t,at:'刚刚'}]}:w);
  save();render();
  setTimeout(()=>{const el2=document.getElementById('ci-'+id);if(el2)el2.focus();},50);
}

/* Detail / Edit */
function openDetail(id,e){
  if(e)e.stopPropagation();
  const w=wishes.find(x=>x.id===id);if(!w)return;
  editingId=id;
  detailEmoji=w.emoji;
  detailCats=[...(w.cats||['exp'])];
  document.getElementById('detail-title').value=w.title;
  document.getElementById('detail-desc').value=w.desc||'';
  // emoji grid
  document.getElementById('detail-emoji-grid').innerHTML=
    EMOJIS.map(em=>`<button class="emoji-btn${em===detailEmoji?' sel':''}" onclick="selDetailEmoji(this,'${em}')">${em}</button>`).join('');
  // type buttons
  document.querySelectorAll('#detail-type-grid .type-btn').forEach(b=>{
    b.classList.toggle('sel',detailCats.includes(b.dataset.t));
  });
  document.getElementById('detail-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('detail-title').focus(),300);
}
function closeDetail(e){if(e.target===document.getElementById('detail-overlay'))document.getElementById('detail-overlay').classList.remove('show');}
function selDetailEmoji(btn,e){
  detailEmoji=e;
  document.querySelectorAll('#detail-emoji-grid .emoji-btn').forEach(b=>b.classList.toggle('sel',b===btn));
}
function toggleDetailType(btn){
  const t=btn.dataset.t;
  if(detailCats.includes(t)){detailCats=detailCats.filter(c=>c!==t);btn.classList.remove('sel');}
  else{detailCats.push(t);btn.classList.add('sel');}
}
function saveDetail(){
  const title=document.getElementById('detail-title').value.trim();
  if(!title||!detailCats.length){alert('请填写标题并选择至少一个类型');return;}
  const desc=document.getElementById('detail-desc').value.trim();
  wishes=wishes.map(w=>w.id===editingId?{...w,title,desc,emoji:detailEmoji,cats:[...detailCats]}:w);
  save();render();
  document.getElementById('detail-overlay').classList.remove('show');
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    filter=btn.dataset.f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b===btn));
    render();
  });
});

function openModal(){
  selEmoji='✨';selCats=[];
  document.getElementById('inp-title').value='';
  document.getElementById('inp-desc').value='';
  document.querySelectorAll('.type-btn:not(#detail-type-grid .type-btn)').forEach(b=>b.classList.remove('sel'));
  document.getElementById('type-hint').textContent='请至少选择一项';
  document.getElementById('submit-btn').disabled=true;
  buildEmojiGrid();
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>document.getElementById('inp-title').focus(),300);
}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function buildEmojiGrid(){
  document.getElementById('emoji-grid').innerHTML=
    EMOJIS.map(e=>`<button class="emoji-btn${e===selEmoji?' sel':''}" onclick="selEmojiBtn(this,'${e}')">${e}</button>`).join('');
}
function selEmojiBtn(btn,e){selEmoji=e;document.querySelectorAll('#emoji-grid .emoji-btn').forEach(b=>b.classList.toggle('sel',b===btn));}
function toggleType(btn){
  const t=btn.dataset.t;
  if(selCats.includes(t)){selCats=selCats.filter(c=>c!==t);btn.classList.remove('sel');}
  else{selCats.push(t);btn.classList.add('sel');}
  const h=document.getElementById('type-hint');
  h.textContent=selCats.length===0?'请至少选择一项':selCats.length===1?'单类愿望':'胖胖愿望 → 粉色卡片 🌸';
  checkSubmit();
}
function checkSubmit(){
  document.getElementById('submit-btn').disabled=!document.getElementById('inp-title').value.trim()||!selCats.length;
}
function addWish(){
  const title=document.getElementById('inp-title').value.trim();
  if(!title||!selCats.length)return;
  const desc=document.getElementById('inp-desc').value.trim();
  wishes=[{id:Date.now(),title,desc,cats:[...selCats],emoji:selEmoji,likes:0,comments:[],done:false,createdAt:Date.now()},...wishes];
  save();closeModal();render();
}

load();
</script>
</body>
</html>
